<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アストロダイス</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Astro Dice</h1>

    <p class="instruction" style="text-align: center; margin-bottom: 15px;">
      ダイスに聞きたいことを思い浮かべて、ボタンを押してください。
    </p>
    
    <div class="cover-image-area" style="text-align: center; margin-bottom: 20px;">
      <img src="astro.png" alt="アストロダイス表紙" style="max-width: 100%; height: auto; border-radius: 8px;">
    </div>
    <video id="diceVideo" class="dice-video" width="360" height="640" playsinline></video>

    <div class="button-container">
      <button id="rollButton">🎲 ダイスを振る</button>
    </div>

    <div id="resultArea" class="result" style="display: none;">
      <div class="result-item">
        <img id="planetImage" src="images/planets/default.png" alt="planet">
        <p id="planetName">―</p>
      </div>
      <div class="result-item">
        <img id="signImage" src="images/signs/default.png" alt="sign">
        <p id="signName">―</p>
      </div>
      <div class="result-item">
        <img id="houseImage" src="images/houses/default.png" alt="house">
        <p id="houseName">―</p>
      </div>
    </div>

    <div id="messageBox" class="message-box" style="display: none;"></div>
  </div>

  <script src="astro.js" defer></script>
</body>
</html>
